<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sticky Games</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      color: #eee;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 2rem 1rem;
    }

    img.logo {
      max-width: 600px;
      width: 100%;
      height: auto;
      margin: 0 auto 1.5rem;
      display: block;
    }

    .description {
      font-size: 1.1rem;
      max-width: 600px;
      margin: 0 auto 2rem;
      line-height: 1.5;
      color: #bbb;
    }

    h2 {
      margin-top: 3rem;
      margin-bottom: 1rem;
      color: #fff;
      letter-spacing: 1px;
    }

    h3 {
      margin-top: 2rem;
      color: #fff;
    }

    .links a {
      color: #1e90ff;
      text-decoration: none;
      font-size: 1.2rem;
      margin: 0.5rem 1rem;
      display: inline-block;
    }

    .links a:hover {
      text-decoration: underline;
      color: #63b3ed;
    }

    .game {
      max-width: 700px;
      margin: 0 auto 2rem;
    }

    .game p {
      color: #bbb;
    }

    .thumbnail {
      margin-top: 1rem;
    }

    .thumbnail img {
      width: 100%;
      max-width: 600px;
      border-radius: 8px;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .thumbnail img:hover {
      transform: scale(1.02);
      opacity: 0.9;
    }
  </style>
</head>

<body>

  <img src="logo.png" alt="Sticky Games Logo" class="logo"/>

  <div class="description">
    Sticky Games is a one-man game development company creating immersive VR experiences.
  </div>

  <!-- LINKS -->
  <h2>Links</h2>
  <div class="links">
    <a href="https://www.youtube.com/@BroMakesGames" target="_blank">YouTube</a>
    <a href="https://discord.gg/qJtc2dbJNs" target="_blank">Discord</a>
  </div>

  <!-- GAMES -->
  <h2>Games</h2>

  <!-- Cozy Digger -->
  <div class="game">
    <h3>Cozy Digger</h3>
    <p>
      A VR sandbox adventure game planned for release on Meta Store in March 2026.
    </p>

    <a class="thumbnail" href="https://www.youtube.com/watch?v=0IY5mLKvYpk" target="_blank">
      <img src="https://img.youtube.com/vi/0IY5mLKvYpk/hqdefault.jpg" alt="Cozy Digger Trailer">
    </a>
  </div>

  <!-- Falldenn -->
  <div class="game">
    <h3>Falldenn</h3>
    <p>
      A VR medieval survival sandbox game currently in development.
    </p>

    <a class="thumbnail" href="https://www.youtube.com/watch?v=XoxgMdImlOw" target="_blank">
      <img src="https://img.youtube.com/vi/XoxgMdImlOw/hqdefault.jpg" alt="Falldenn Devlog">
    </a>
  </div>

</body>
</html>
